name: Build protein DL container

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model folder under models/"
        required: true
        type: choice
        options:
          - boltz2
          - ligandmpnn
          - rfdiffusion
          - proteinmpnn
      tag:
        description: "Version tag, e.g. 0.1.0-arm64"
        required: true
        default: "dev-arm64"
      push_latest:
        description: "Also push latest-arm64"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    env:
      REGISTRY: ghcr.io
      MODEL: ${{ inputs.model }}
      TAG: ${{ inputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare lowercase image names
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "OWNER_LC=${OWNER_LC}" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/${OWNER_LC}/${MODEL}" >> "$GITHUB_ENV"
          echo "SIF_IMAGE=ghcr.io/${OWNER_LC}/${MODEL}-sif" >> "$GITHUB_ENV"
          echo "SIF_FILE=${MODEL}_${TAG}.sif" >> "$GITHUB_ENV"

      - name: Login to GHCR with Docker
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io \
              -u "${{ github.actor }}" \
              --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ARM64 Docker/OCI image
        uses: docker/build-push-action@v6
        with:
          context: ./models/${{ inputs.model }}
          file: ./models/${{ inputs.model }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
          cache-from: type=gha,scope=${{ inputs.model }}
          cache-to: type=gha,mode=max,scope=${{ inputs.model }}

      - name: Optionally tag latest-arm64
        if: ${{ inputs.push_latest }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:latest-arm64" \
            "${IMAGE}:${TAG}"

      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6

      - name: Login to GHCR with Apptainer
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            apptainer registry login \
              --username "${{ github.actor }}" \
              --password-stdin \
              docker://ghcr.io

      - name: Build SIF from Docker/OCI image
        run: |
          apptainer build --arch arm64 "${SIF_FILE}" "docker://${IMAGE}:${TAG}"

      - name: Test SIF
        run: |
          TEST_SCRIPT="${GITHUB_WORKSPACE}/models/${MODEL}/test.sh"
          if [ ! -f "${TEST_SCRIPT}" ]; then
            echo "No test.sh found for ${MODEL}, skipping."
            exit 0
          fi
          chmod +x "${TEST_SCRIPT}"
          apptainer exec \
            --bind "${TEST_SCRIPT}:/opt/test.sh:ro" \
            "${SIF_FILE}" \
            /bin/bash /opt/test.sh

      - name: Push SIF to GHCR via ORAS
        run: |
          apptainer push "${SIF_FILE}" "oras://${SIF_IMAGE}:${TAG}"

      - name: Optionally push SIF latest-arm64
        if: ${{ inputs.push_latest }}
        run: |
          apptainer push "${SIF_FILE}" "oras://${SIF_IMAGE}:latest-arm64"

      - name: Print pull commands
        run: |
          echo "Docker/OCI image:"
          echo "  docker pull ${IMAGE}:${TAG}"
          echo ""
          echo "Apptainer SIF:"
          echo "  apptainer pull ${MODEL}_${TAG}.sif oras://${SIF_IMAGE}:${TAG}"
