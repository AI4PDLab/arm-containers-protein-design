name: Build protein DL container

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model folder under models/"
        required: true
        type: choice
        options:
          - boltz2
          - ligandmpnn
          - rfdiffusion
          - proteinmpnn
      tag:
        description: "Version tag, e.g. 0.1.0-arm64"
        required: true
        default: "dev-arm64"
      push_latest:
        description: "Also push latest-arm64"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    env:
      REGISTRY: ghcr.io
      MODEL: ${{ inputs.model }}
      TAG: ${{ inputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare lowercase image names
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "OWNER_LC=${OWNER_LC}" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/${OWNER_LC}/${MODEL}" >> "$GITHUB_ENV"
          echo "SIF_IMAGE=ghcr.io/${OWNER_LC}/${MODEL}-sif" >> "$GITHUB_ENV"

      - name: Login to GHCR with Docker
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io \
              -u "${{ github.actor }}" \
              --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ARM64 Docker/OCI image
        uses: docker/build-push-action@v6
        with:
          context: ./models/${{ inputs.model }}
          file: ./models/${{ inputs.model }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
          cache-from: type=gha,scope=${{ inputs.model }}
          cache-to: type=gha,mode=max,scope=${{ inputs.model }}

      - name: Test Docker image on ARM64 runner
        run: |
          docker run --rm "${IMAGE}:${TAG}" /bin/bash -lc "python --version"

      - name: Optionally tag latest-arm64
        if: ${{ inputs.push_latest }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:latest-arm64" \
            "${IMAGE}:${TAG}"

  build-sif:
    needs: build
    runs-on: ubuntu-24.04

    env:
      MODEL: ${{ inputs.model }}
      TAG: ${{ inputs.tag }}

    steps:
      - name: Prepare lowercase image names
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "OWNER_LC=${OWNER_LC}" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/${OWNER_LC}/${MODEL}" >> "$GITHUB_ENV"
          echo "SIF_IMAGE=ghcr.io/${OWNER_LC}/${MODEL}-sif" >> "$GITHUB_ENV"
          echo "SIF_FILE=${MODEL}_${TAG}.sif" >> "$GITHUB_ENV"

      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6

      - name: Login to GHCR for Docker pulls
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            apptainer registry login \
              --username "${{ github.actor }}" \
              --password-stdin \
              docker://ghcr.io

      - name: Pull ARM64 Docker/OCI image as SIF
        run: |
          apptainer pull --arch arm64 -F "${SIF_FILE}" "docker://${IMAGE}:${TAG}"

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1
        with:
          version: 1.3.0

      - name: Login to GHCR with ORAS
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            oras login ghcr.io \
              -u "${{ github.actor }}" \
              --password-stdin

      - name: Push SIF to GHCR with ORAS
        run: |
          printf '{}' > sif-config.json

          oras push --image-spec v1.0 \
            --config sif-config.json:application/vnd.sylabs.sif.config.v1+json \
            "${SIF_IMAGE}:${TAG}" \
            "${SIF_FILE}:application/vnd.sylabs.sif.layer.v1.sif"

      - name: Optionally push SIF latest-arm64
        if: ${{ inputs.push_latest }}
        run: |
          printf '{}' > sif-config.json

          oras push --image-spec v1.0 \
            --config sif-config.json:application/vnd.sylabs.sif.config.v1+json \
            "${SIF_IMAGE}:latest-arm64" \
            "${SIF_FILE}:application/vnd.sylabs.sif.layer.v1.sif"

      - name: Print pull command
        run: |
          echo "Pull with:"
          echo "apptainer pull ${MODEL}_${TAG}.sif oras://${SIF_IMAGE}:${TAG}"
